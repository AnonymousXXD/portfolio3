<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planète extraterrestre</title>
  <style>
    :root {
      --sky: #040b18;
      --planet: #2dd4bf;
      --planet2: #0ea5e9;
      --rock: #475569;
      --fog: rgba(148, 163, 184, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, #172554 0%, #0f172a 35%, #020617 100%);
      color: #eff6ff;
      overflow: hidden;
    }

    .scene {
      width: min(96vw, 1100px);
      height: min(92vh, 760px);
      border-radius: 30px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.12), transparent 18%),
        linear-gradient(180deg, #020617 0%, #111827 55%, #020617 100%);
      border: 1px solid rgba(148,163,184,0.16);
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.45);
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.9;
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { transform: scale(1); opacity: 0.55; }
      50% { transform: scale(1.4); opacity: 1; }
    }

    .planet {
      position: absolute;
      left: 50%;
      top: 48%;
      width: 420px;
      height: 420px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 18%),
        radial-gradient(circle at 60% 40%, rgba(125, 211, 252, 0.35), transparent 12%),
        radial-gradient(circle at 50% 80%, rgba(6, 182, 212, 0.20), transparent 16%),
        linear-gradient(145deg, #34d399 0%, #0ea5e9 50%, #1e293b 100%);
      box-shadow:
        inset -25px -35px 45px rgba(2, 6, 23, 0.45),
        inset 18px 18px 35px rgba(255,255,255,0.12),
        0 0 0 10px rgba(125,211,252,0.08),
        0 30px 60px rgba(14, 165, 233, 0.18);
      overflow: hidden;
      animation: floatPlanet 6s ease-in-out infinite;
    }

    .planet::before,
    .planet::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.12);
      opacity: 0.8;
    }

    .planet::before {
      inset: 18% 15% auto 15%;
      height: 18px;
      transform: rotate(-14deg);
    }

    .planet::after {
      inset: auto 12% 18% 18%;
      height: 14px;
      transform: rotate(18deg);
    }

    .ring {
      position: absolute;
      width: 520px;
      height: 520px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(18deg);
      border: 2px dashed rgba(191, 219, 254, 0.25);
      border-radius: 50%;
      opacity: 0.55;
    }

    .cloud {
      position: absolute;
      width: 90px;
      height: 28px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      filter: blur(1px);
      animation: drift 18s linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .cloud::before { width: 30px; height: 30px; left: 10px; top: -12px; }
    .cloud::after  { width: 24px; height: 24px; right: 10px; top: -8px; }

    .cloud.a { top: 18%; left: -120px; }
    .cloud.b { top: 30%; left: -220px; animation-duration: 26s; }
    .cloud.c { top: 68%; left: -140px; animation-duration: 22s; }

    @keyframes drift {
      0% { transform: translateX(0); }
      100% { transform: translateX(1400px); }
    }

    @keyframes floatPlanet {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -52%) scale(1.02); }
    }

    .creature {
      position: absolute;
      width: 48px;
      height: 54px;
      transform-origin: center bottom;
      animation: hop 1.8s ease-in-out infinite;
    }

    .creature .body {
      position: absolute;
      left: 8px;
      top: 8px;
      width: 32px;
      height: 32px;
      border-radius: 50% 50% 45% 45%;
      background: linear-gradient(180deg, #a78bfa, #7c3aed);
      box-shadow: inset -4px -6px 8px rgba(30, 41, 59, 0.3);
    }

    .creature .eye {
      position: absolute;
      top: 14px;
      left: 10px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #eff6ff;
      box-shadow: 12px 0 0 #eff6ff;
    }

    .creature .leg {
      position: absolute;
      bottom: 0;
      width: 6px;
      height: 18px;
      background: #4c1d95;
      border-radius: 999px;
      transform-origin: top center;
      animation: legSwing 1.2s ease-in-out infinite;
    }

    .creature .leg.left  { left: 12px; }
    .creature .leg.right { left: 28px; animation-delay: -0.6s; }

    .creature .arm {
      position: absolute;
      top: 18px;
      width: 5px;
      height: 16px;
      background: #5b21b6;
      border-radius: 999px;
      transform-origin: top center;
      animation: armSwing 1.2s ease-in-out infinite;
    }

    .creature .arm.left  { left: 6px; transform: rotate(18deg); }
    .creature .arm.right { right: 6px; transform: rotate(-18deg); animation-delay: -0.6s; }

    @keyframes hop {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes legSwing {
      0%, 100% { transform: rotate(8deg); }
      50% { transform: rotate(-8deg); }
    }

    @keyframes armSwing {
      0%, 100% { transform: rotate(12deg); }
      50% { transform: rotate(-12deg); }
    }

    .info {
      position: absolute;
      left: 18px;
      bottom: 18px;
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148,163,184,0.15);
      border-radius: 14px;
      padding: 12px 14px;
      max-width: 360px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .info h1 {
      margin: 0 0 6px;
      font-size: 1rem;
      color: #bfdbfe;
    }

    .info p {
      margin: 0;
      color: #dbeafe;
      font-size: 0.92rem;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="Planète extraterrestre 2D avec habitants animés">
    <div class="planet"></div>
    <div class="ring"></div>

    <div class="cloud a"></div>
    <div class="cloud b"></div>
    <div class="cloud c"></div>

    <div class="creature" style="left: 18%; top: 58%; transform: scale(1.1);">
      <div class="arm left"></div>
      <div class="arm right"></div>
      <div class="body"><div class="eye"></div></div>
      <div class="leg left"></div>
      <div class="leg right"></div>
    </div>

    <div class="creature" style="left: 30%; top: 72%; transform: scale(0.9); animation-delay: -0.5s;">
      <div class="arm left"></div>
      <div class="arm right"></div>
      <div class="body"><div class="eye"></div></div>
      <div class="leg left"></div>
      <div class="leg right"></div>
    </div>

    <div class="creature" style="left: 72%; top: 58%; transform: scale(1.0); animation-delay: -1s;">
      <div class="arm left"></div>
      <div class="arm right"></div>
      <div class="body"><div class="eye"></div></div>
      <div class="leg left"></div>
      <div class="leg right"></div>
    </div>

    <div class="info">
      <h1>Planète d’un peuple lointain</h1>
      <p>Voici une scène 2D simple où l’on voit des créatures extraterrestres évoluer sur une planète bleue et verdâtre avec des nuages flottants.</p>
    </div>
  </main>

  <script>
    function createStars() {
      const scene = document.querySelector('.scene');
      for (let i = 0; i < 60; i++) {
        const s = document.createElement('span');
        s.className = 'star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.width = (Math.random() * 2 + 1) + 'px';
        s.style.height = s.style.width;
        s.style.animationDelay = (Math.random() * 3) + 's';
        s.style.animationDuration = (Math.random() * 2 + 2.5) + 's';
        scene.appendChild(s);
      }
    }

    createStars();
  </script>
</body>
</html>
