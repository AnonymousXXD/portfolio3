
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini test couleur</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --text: #f9fafb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827 45%, #1f2937);
      color: var(--text);
    }

    .card {
      width: min(92vw, 420px);
      padding: 24px;
      border-radius: 18px;
      background: rgba(17, 24, 39, 0.92);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 18px;
      color: #d1d5db;
      font-size: 0.98rem;
    }

    #bonjour {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      transition: color 0.25s ease;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      color: #111827;
      background: linear-gradient(135deg, #facc15, #fb7185);
      box-shadow: 0 10px 18px rgba(250, 204, 21, 0.2);
      transition: transform 0.08s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(250, 204, 21, 0.28);
    }

    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Mini test HTML/CSS/JavaScript</h1>
    <p>Clique sur le bouton pour changer la couleur du mot “Bonjour”.</p>
    <div id="bonjour">Bonjour</div>
    <p style="margin-top: 14px; font-size: 0.9rem; color: #bfdbfe;">7 couleurs différentes, une à chaque clic.</p>
    <button id="btnColor" type="button">Changer la couleur</button>
  </main>

  <script>
    const colors = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#14b8a6', '#ec4899'];
    const mot = document.getElementById('bonjour');
    const bouton = document.getElementById('btnColor');

    let index = 0;

    bouton.addEventListener('click', () => {
      mot.style.color = colors[index];
      index = (index + 1) % colors.length;
    });
  </script>
</body>
</html>
